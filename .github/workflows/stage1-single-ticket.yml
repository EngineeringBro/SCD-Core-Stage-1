name: SCD Core Stage 1 Single Ticket

on:
  workflow_dispatch:
    inputs:
      scan_ticket_id:
        description: Jira ticket id to process in single-ticket mode
        required: true
        type: string

jobs:
  run-single-ticket:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    env:
      SCAN_TICKET_ID: ${{ inputs.scan_ticket_id }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run orchestrator
        id: orchestrator
        continue-on-error: true
        shell: bash
        run: |
          python orchestrator.py | tee orchestrator-output.txt

      - name: Publish issue description output
        if: always()
        shell: bash
        run: |
          {
            echo "## Generated Issue Description"
            echo
            echo '```text'
            cat orchestrator-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const ticketId = process.env.SCAN_TICKET_ID;
            const filePath = 'orchestrator-output.txt';
            let body = `No orchestrator output was captured for ${ticketId}.`;

            if (fs.existsSync(filePath)) {
              body = fs.readFileSync(filePath, 'utf8').trim();
            }

            if (!body) {
              body = `No orchestrator output was captured for ${ticketId}.`;
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `SCD Core Stage 1 - ${ticketId}`,
              body,
            });

            core.info(`Created issue #${issue.data.number}`);