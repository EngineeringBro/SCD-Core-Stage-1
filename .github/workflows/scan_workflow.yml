name: Scan

on:
  workflow_dispatch:
    inputs:
      scan_ticket_id:
        description: Jira ticket id to process in single-ticket mode
        required: true
        type: string

jobs:
  run-single-ticket:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    env:
      SCAN_TICKET_ID: ${{ inputs.scan_ticket_id }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      COPILOT_TOKEN: ${{ secrets.GH_COPILOT_OAUTH }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check openai

      - name: Run orchestrator
        id: orchestrator
        continue-on-error: true
        shell: bash
        run: |
          python orchestrator.py | tee orchestrator-output.txt

      - name: Publish issue description output
        if: always()
        shell: bash
        run: |
          {
            echo "## Generated Issue Description"
            echo
            echo '```text'
            cat orchestrator-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const ticketId = process.env.SCAN_TICKET_ID;
            const filePath = 'orchestrator-output.txt';
            let rawOutput = '';

            if (fs.existsSync(filePath)) {
              rawOutput = fs.readFileSync(filePath, 'utf8').trim();
            }

            if (!rawOutput) {
              rawOutput = [
                'Recommendation: error',
                `Ticket ID: ${ticketId}`,
                'Module: unknown',
                'Issue Body:',
                'No issue body available.',
                'Notes:',
                `- No orchestrator output was captured for ${ticketId}.`,
              ].join('\n');
            }

            const lines = rawOutput.split(/\r?\n/);
            const readField = (fieldName) => {
              const prefix = `${fieldName}:`;
              const line = lines.find((value) => value.startsWith(prefix));
              return line ? line.slice(prefix.length).trim() : '';
            };

            const recommendation = readField('Recommendation') || 'unknown';
            const parsedTicketId = readField('Ticket ID') || ticketId;
            const moduleName = readField('Module') || 'unknown';

            const issueBodyIndex = lines.findIndex((value) => value.trim() === 'Issue Body:');
            const notesIndex = lines.findIndex((value) => value.trim() === 'Notes:');
            const issueBodyLines = issueBodyIndex >= 0
              ? lines.slice(issueBodyIndex + 1, notesIndex >= 0 ? notesIndex : lines.length)
              : [];
            const issueBody = issueBodyLines.join('\n').trim() || recommendation;
            const notesLines = notesIndex >= 0 ? lines.slice(notesIndex + 1) : ['- None'];
            const notes = notesLines.join('\n').trim() || '- None';

            const title = `[${recommendation}] ${parsedTicketId} - ${moduleName}`;
            const body = [
              issueBody,
              '---',
              'Notes',
              notes,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });

            core.info(`Created issue #${issue.data.number}`);