name: Scan

concurrency:
  group: scan-workflow
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Scan mode
        required: true
        default: Manual
        type: choice
        options:
          - Auto Scan mode
          - Manual
      scan_ticket_id:
        description: Jira ticket id to process when mode is Manual
        required: false
        type: string
  schedule:
    - cron: "*/5 * * * *"

jobs:
  auto-scan-mode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    env:
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve scan target
        id: resolve-target
        shell: bash
        env:
          SCAN_EVENT_NAME: ${{ github.event_name }}
          SCAN_MODE: ${{ inputs.mode }}
          REQUESTED_TICKET_ID: ${{ inputs.scan_ticket_id }}
        run: |
          python Core/scan_auto.py resolve \
            --event-name "$SCAN_EVENT_NAME" \
            --mode "${SCAN_MODE:-Manual}" \
            --ticket-id "${REQUESTED_TICKET_ID:-}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        if: steps.resolve-target.outputs.should_scan == 'true'
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check openai faster-whisper

      - name: Run orchestrator
        if: steps.resolve-target.outputs.should_scan == 'true'
        id: orchestrator
        continue-on-error: true
        shell: bash
        env:
          SCAN_TICKET_QUEUE_JSON: ${{ steps.resolve-target.outputs.ticket_queue_json }}
        run: |
          mkdir -p scan-output
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys

          queue = json.loads(os.environ.get("SCAN_TICKET_QUEUE_JSON") or "[]")
          if not queue:
              raise SystemExit("Expected at least one ticket in SCAN_TICKET_QUEUE_JSON")

          output_dir = pathlib.Path("scan-output")
          output_dir.mkdir(parents=True, exist_ok=True)

          for ticket in queue:
              ticket_id = str(ticket.get("ticket_id") or "").strip()
              if not ticket_id:
                  continue

              env = os.environ.copy()
              env["SCAN_TICKET_ID"] = ticket_id
              result = subprocess.run(
                  [sys.executable, "Core/orchestrator.py"],
                  check=False,
                  capture_output=True,
                  text=True,
                  env=env,
              )

              combined_output = result.stdout or ""
              if result.stderr:
                  combined_output += result.stderr

              (output_dir / f"{ticket_id}.txt").write_text(combined_output, encoding="utf-8")
              print(combined_output, end="")

              if result.returncode != 0:
                  raise SystemExit(result.returncode)
          PY

      - name: Publish issue description output
        if: always()
        shell: bash
        run: |
          {
            echo "## Generated Issue Description"
            echo
            if compgen -G "scan-output/*.txt" > /dev/null; then
              for output_file in scan-output/*.txt; do
                ticket_id="$(basename "$output_file" .txt)"
                echo "### $ticket_id"
                echo
                echo '```text'
                cat "$output_file"
                echo '```'
                echo
              done
            else
              echo "${{ steps.resolve-target.outputs.status_message }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue
        if: steps.resolve-target.outputs.should_scan == 'true'
        uses: actions/github-script@v9
        env:
          SCAN_TICKET_QUEUE_JSON: ${{ steps.resolve-target.outputs.ticket_queue_json }}
        with:
          script: |
            const fs = require('fs');
            const ticketQueue = JSON.parse(process.env.SCAN_TICKET_QUEUE_JSON || '[]');

            const toTitleCase = (value) => value
              .split(/\s+/)
              .filter(Boolean)
              .map((part) => {
                if (/^v\d/i.test(part)) {
                  return part;
                }
                return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
              })
              .join(' ');

            const formatModuleName = (value, fallback) => {
              if (!value || value === 'unknown') {
                return fallback;
              }
              return toTitleCase(value);
            };

            const extractNotificationTitleWord = (body) => {
              const caseNameMatch = body.match(/^- Case name:\s*(.+)$/mi);
              if (!caseNameMatch) {
                return 'Unknown';
              }

              const caseName = caseNameMatch[1].trim();
              if (!caseName || /^no match$/i.test(caseName)) {
                return 'No Match';
              }

              const firstWord = caseName.split(/\s+/)[0] || 'Unknown';
              return firstWord;
            };

            const buildAlignedTitle = ({ moduleId, recommendation, parsedTicketId, moduleName, issueBody }) => {
              if (moduleId === 'ringcentral') {
                const ringcentralModuleName = formatModuleName(moduleName, 'Ringcentral Module v1.0');
                if (recommendation === 'ringcentral_spam_safe_to_dismiss') {
                  return `Spam [${parsedTicketId} - ${ringcentralModuleName}]`;
                }
                if (recommendation === 'ringcentral_voicemail_callback_needed') {
                  return `Voice Message [${parsedTicketId} - ${ringcentralModuleName}]`;
                }
                return `Missed Call [${parsedTicketId} - ${ringcentralModuleName}]`;
              }

              if (moduleId === 'general') {
                const generalModuleName = formatModuleName(moduleName, 'General Knowledge Module v1.0');
                const generalTitleMap = {
                  knowledge_gap: 'Guidance Needed',
                  knowledge_guidance: 'Knowledge Assistance',
                  knowledge_guidance_fallback: 'Static Knowledge Assistance',
                };
                const generalPrefix = generalTitleMap[recommendation] || toTitleCase(recommendation.replace(/_/g, ' '));
                return `${generalPrefix} [${parsedTicketId} - ${generalModuleName}]`;
              }

              if (moduleId === 'spam') {
                const spamModuleName = formatModuleName(moduleName, 'Spam Module v1.0');
                return `Spam Detected [${parsedTicketId} - ${spamModuleName}]`;
              }

              if (moduleId === 'orphaned_transaction') {
                const orphanedModuleName = formatModuleName(moduleName, 'Orphaned Transaction Module v1.1');
                return `SQL Insert Required [${parsedTicketId} - ${orphanedModuleName}]`;
              }

              if (moduleId === 'notification') {
                const notificationModuleName = formatModuleName(moduleName, 'Notifications Module v1.0');
                const notificationWord = extractNotificationTitleWord(issueBody);
                return `Notification: ${notificationWord} [${parsedTicketId} - ${notificationModuleName}]`;
              }

              return `[${recommendation}] ${parsedTicketId} - ${moduleName}`;
            };

            for (const ticket of ticketQueue) {
              const ticketId = String(ticket.ticket_id || '').trim();
              if (!ticketId) {
                continue;
              }

              const filePath = `scan-output/${ticketId}.txt`;
              let rawOutput = '';

              if (fs.existsSync(filePath)) {
                rawOutput = fs.readFileSync(filePath, 'utf8').trim();
              }

              if (!rawOutput) {
                rawOutput = [
                  'Recommendation: error',
                  `Ticket ID: ${ticketId}`,
                  'Module: unknown',
                  'Issue Body:',
                  'No issue body available.',
                  'Notes:',
                  `- No orchestrator output was captured for ${ticketId}.`,
                ].join('\n');
              }

              const lines = rawOutput.split(/\r?\n/);
              const readField = (fieldName) => {
                const prefix = `${fieldName}:`;
                const line = lines.find((value) => value.startsWith(prefix));
                return line ? line.slice(prefix.length).trim() : '';
              };

              const recommendation = readField('Recommendation') || 'unknown';
              const parsedTicketId = readField('Ticket ID') || ticketId;
              const moduleId = readField('Module ID') || 'unknown';
              const moduleName = readField('Module') || 'unknown';

              const issueBodyIndex = lines.findIndex((value) => value.trim() === 'Issue Body:');
              const notesIndex = lines.findIndex((value) => value.trim() === 'Notes:');
              const transcriptIndex = lines.findIndex((value) => value.trim() === 'Word for word transcript:');
              const issueBodyLines = issueBodyIndex >= 0
                ? lines.slice(issueBodyIndex + 1, notesIndex >= 0 ? notesIndex : lines.length)
                : [];
              const issueBody = issueBodyLines.join('\n').trim() || recommendation;
              const notesLines = notesIndex >= 0
                ? lines.slice(notesIndex + 1, transcriptIndex >= 0 ? transcriptIndex : lines.length)
                : ['- None'];
              const notes = notesLines.join('\n').trim() || '- None';
              const transcriptLines = transcriptIndex >= 0 ? lines.slice(transcriptIndex + 1) : [];
              const transcript = transcriptLines.join('\n').trim();

              const title = buildAlignedTitle({
                moduleId,
                recommendation,
                parsedTicketId,
                moduleName,
                issueBody,
              });
              const bodyParts = [
                issueBody,
                `<!-- module_id: ${moduleId} -->`,
                '---',
                'Notes',
                notes,
              ];

              if (transcript) {
                bodyParts.push('---', 'Word for word transcript', transcript);
              }

              const body = bodyParts.join('\n');

              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });

              core.info(`Created issue #${issue.data.number} for ${parsedTicketId}`);
            }

      - name: Mark latest scanned ticket
        id: mark-scanned
        if: steps.resolve-target.outputs.should_scan == 'true' && success()
        shell: bash
        env:
          SCAN_TICKET_QUEUE_JSON: ${{ steps.resolve-target.outputs.ticket_queue_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          queue = json.loads(os.environ.get("SCAN_TICKET_QUEUE_JSON") or "[]")
          if not queue:
              raise SystemExit("Expected at least one ticket in SCAN_TICKET_QUEUE_JSON")

          for ticket in queue:
              ticket_id = str(ticket.get("ticket_id") or "").strip()
              created_at = str(ticket.get("ticket_created_at") or "").strip()
              if not ticket_id or not created_at:
                  continue

              subprocess.run(
                  [
                      sys.executable,
                      "Core/scan_auto.py",
                      "mark-scanned",
                      "--ticket-id",
                      ticket_id,
                      "--created-at",
                      created_at,
                      "--github-output",
                      os.environ["GITHUB_OUTPUT"],
                  ],
                  check=True,
              )
          PY

      - name: Persist auto scan state
        if: always()
        shell: bash
        run: |
          if git diff --quiet -- .github/scan_auto_state.json; then
            echo "Auto scan state unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/scan_auto_state.json
          git commit -m "Update auto scan state"
          git push origin HEAD:${GITHUB_REF_NAME}