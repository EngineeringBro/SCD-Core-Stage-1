name: Execute Gate

on:
  issues:
    types:
      - closed

jobs:
  authorize-execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authorize and dispatch execute
        shell: bash
        run: |
          python Executes/dispatch_execute_workflow.py