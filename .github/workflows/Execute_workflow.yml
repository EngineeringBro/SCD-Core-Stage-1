name: Execute

on:
  issues:
    types:
      - closed

jobs:
  execute-single-ticket:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'closed' &&
      github.event.issue.pull_request == null &&
      github.event.issue.state_reason == 'completed' &&
      contains(github.event.issue.labels.*.name, 'Permission to Execute')
    runs-on: ubuntu-latest
    environment: execute
    permissions:
      contents: write
      issues: write

    env:
      PYTHONIOENCODING: utf-8
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_WRITE_API_TOKEN: ${{ secrets.JIRA_WRITE_API_TOKEN }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve execution ticket
        id: resolve-ticket
        shell: bash
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          issue_title = os.environ.get("ISSUE_TITLE", "")
          issue_number = os.environ.get("ISSUE_NUMBER", "")
          title_match = re.search(r"\[(SCD-\d+)\s*-\s*([^\]]+?)\]\s*$", issue_title, re.IGNORECASE)
          if not title_match:
              title_match = re.search(r"^\[[^\]]+\]\s*(SCD-\d+)\s*-\s*(.+?)\s*$", issue_title, re.IGNORECASE)
          if not title_match:
              raise SystemExit("Issue title does not include a parseable ticket id and module name.")

          ticket_id = str(title_match.group(1) or "").strip().upper()
          module_name = str(title_match.group(2) or "").strip()
          if not ticket_id:
              raise SystemExit("Parsed SCD ticket id was empty.")
          if not module_name:
              raise SystemExit("Parsed module name was empty.")

          github_env = os.environ.get("GITHUB_ENV", "")
          github_output = os.environ.get("GITHUB_OUTPUT", "")
          if github_env:
              with open(github_env, "a", encoding="utf-8") as handle:
                  handle.write(f"SCD_TICKET_ID={ticket_id}\n")
                  handle.write(f"EXECUTE_ISSUE_NUMBER={issue_number}\n")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as handle:
                  handle.write(f"scd_ticket_id={ticket_id}\n")
                  handle.write(
                      f"status_message=Auto execute approved for {ticket_id} ({module_name}) from closed issue #{issue_number}.\n"
                  )

          print(f"Auto execute approved for {ticket_id} ({module_name}) from closed issue #{issue_number}.")
          PY

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check openai

      - name: Resolve execute module
        id: resolve-module
        shell: bash
        run: |
          EXECUTE_MODULE=$(python Executes/execute_router.py)
          echo "Resolved execute module: $EXECUTE_MODULE"
          echo "execute_module=$EXECUTE_MODULE" >> "$GITHUB_OUTPUT"

      - name: Run execute flow
        shell: bash
        run: |
          case "${{ steps.resolve-module.outputs.execute_module }}" in
            orphaned_transaction)
              python "Executes/Modules Executes/execute_orphaned_transaction.py" | tee execute-output.txt
              ;;
            notification)
              python "Executes/Modules Executes/execute_notifications.py" | tee execute-output.txt
              ;;
            spam)
              python "Executes/Modules Executes/execute_spam.py" | tee execute-output.txt
              ;;
            ringcentral)
              python "Executes/Modules Executes/execute_ringcentral_spam.py" | tee execute-output.txt
              ;;
            general)
              python "Executes/Modules Executes/execute_general_module.py" | tee execute-output.txt
              ;;
            *)
              echo "Unsupported EXECUTE_MODULE: ${{ steps.resolve-module.outputs.execute_module }}" >&2
              exit 1
              ;;
          esac

      - name: Persist notification log
        if: steps.resolve-module.outputs.execute_module == 'notification'
        shell: bash
        run: |
          if git diff --quiet -- 'modules/notifications_module/output/Notifications log.md'; then
            echo "Notification log unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'modules/notifications_module/output/Notifications log.md'
          git commit -m "Update notification log"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Close GitHub issue for executed ticket
        shell: bash
        run: |
          python Executes/close_execute_issue.py

      - name: Publish execute summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Execute Result"
            echo
            if [[ -f execute-output.txt ]]; then
              echo '```text'
              cat execute-output.txt
              echo '```'
            else
              echo "Execute job was skipped or ended before module output was created."
            fi
          } >> "$GITHUB_STEP_SUMMARY"