name: Execute

on:
  workflow_dispatch:
    inputs:
      scd_ticket_id:
        description: Single SCD ticket to execute
        required: true
        type: string
      execute_module:
        description: Module execute flow to run
        required: true
        default: orphaned_transaction
        type: choice
        options:
          - orphaned_transaction
          - general

jobs:
  execute-single-ticket:
    runs-on: ubuntu-latest
    environment: execute
    permissions:
      contents: read

    env:
      PYTHONIOENCODING: utf-8
      SCD_TICKET_ID: ${{ inputs.scd_ticket_id }}
      EXECUTE_MODULE: ${{ inputs.execute_module }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_WRITE_API_TOKEN: ${{ secrets.JIRA_WRITE_API_TOKEN }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check openai

      - name: Run execute flow
        shell: bash
        run: |
          case "$EXECUTE_MODULE" in
            orphaned_transaction)
              python execute_orphaned_transaction.py | tee execute-output.txt
              ;;
            general)
              python execute_general_module.py | tee execute-output.txt
              ;;
            *)
              echo "Unsupported EXECUTE_MODULE: $EXECUTE_MODULE" >&2
              exit 1
              ;;
          esac

      - name: Publish execute summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Execute Result"
            echo
            echo '```text'
            cat execute-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"