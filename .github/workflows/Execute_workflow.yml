name: Execute

on:
  workflow_dispatch:
    inputs:
      scd_ticket_id:
        description: Single SCD ticket to execute
        required: true
        type: string
  issues:
    types:
      - closed

jobs:
  execute-single-ticket:
    runs-on: ubuntu-latest
    environment: execute
    permissions:
      contents: write
      issues: write

    env:
      PYTHONIOENCODING: utf-8
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_WRITE_API_TOKEN: ${{ secrets.JIRA_WRITE_API_TOKEN }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Resolve execution ticket
        id: resolve-ticket
        uses: actions/github-script@v9
        env:
          WORKFLOW_INPUT_TICKET: ${{ inputs.scd_ticket_id }}
        with:
          script: |
            const eventName = context.eventName;
            const permissionLabel = 'permission to execute';

            const exportExecution = (ticketId, statusMessage) => {
              core.exportVariable('SCD_TICKET_ID', ticketId);
              core.setOutput('should_execute', 'true');
              core.setOutput('scd_ticket_id', ticketId);
              core.setOutput('status_message', statusMessage);
            };

            const skipExecution = (statusMessage) => {
              core.notice(statusMessage);
              core.setOutput('should_execute', 'false');
              core.setOutput('status_message', statusMessage);
            };

            if (eventName === 'workflow_dispatch') {
              const ticketId = String(process.env.WORKFLOW_INPUT_TICKET || '').trim().toUpperCase();
              if (!ticketId) {
                core.setFailed('workflow_dispatch requires scd_ticket_id');
                return;
              }

              exportExecution(ticketId, `Manual execute requested for ${ticketId}.`);
              return;
            }

            const issue = context.payload.issue;
            if (!issue) {
              skipExecution('Skipped execute: issue payload is missing.');
              return;
            }

            if (issue.pull_request) {
              skipExecution('Skipped execute: pull request events are not supported.');
              return;
            }

            if (String(issue.state_reason || '') !== 'completed') {
              skipExecution('Skipped execute: issue was not closed as completed.');
              return;
            }

            const labelNames = Array.isArray(issue.labels)
              ? issue.labels.map((label) => String(label.name || '').trim().toLowerCase())
              : [];

            if (!labelNames.includes(permissionLabel)) {
              skipExecution("Skipped execute: missing required label 'Permission to Execute'.");
              return;
            }

            const issueTitle = String(issue.title || '');
            const titleMatch = issueTitle.match(/\[(SCD-\d+)\s*-\s*([^\]]+?)\]\s*$/i)
              || issueTitle.match(/^\[[^\]]+\]\s*(SCD-\d+)\s*-\s*(.+?)\s*$/i);

            if (!titleMatch) {
              skipExecution('Skipped execute: issue title does not include a parseable ticket id and module name.');
              return;
            }

            const ticketId = String(titleMatch[1] || '').trim().toUpperCase();
            const moduleName = String(titleMatch[2] || '').trim();
            if (!ticketId) {
              skipExecution('Skipped execute: parsed SCD ticket id was empty.');
              return;
            }
            if (!moduleName) {
              skipExecution('Skipped execute: parsed module name from title was empty.');
              return;
            }

            core.exportVariable('EXECUTE_ISSUE_NUMBER', String(issue.number));
            exportExecution(ticketId, `Auto execute approved for ${ticketId} (${moduleName}) from closed issue #${issue.number}.`);

      - name: Check out repository
        if: steps.resolve-ticket.outputs.should_execute == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.resolve-ticket.outputs.should_execute == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.resolve-ticket.outputs.should_execute == 'true'
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check openai

      - name: Resolve execute module
        id: resolve-module
        if: steps.resolve-ticket.outputs.should_execute == 'true'
        shell: bash
        run: |
          EXECUTE_MODULE=$(python Executes/execute_router.py)
          echo "Resolved execute module: $EXECUTE_MODULE"
          echo "execute_module=$EXECUTE_MODULE" >> "$GITHUB_OUTPUT"

      - name: Run execute flow
        if: steps.resolve-ticket.outputs.should_execute == 'true'
        shell: bash
        run: |
          case "${{ steps.resolve-module.outputs.execute_module }}" in
            orphaned_transaction)
              python "Executes/Modules Executes/execute_orphaned_transaction.py" | tee execute-output.txt
              ;;
            notification)
              python "Executes/Modules Executes/execute_notifications.py" | tee execute-output.txt
              ;;
            spam)
              python "Executes/Modules Executes/execute_spam.py" | tee execute-output.txt
              ;;
            ringcentral)
              python "Executes/Modules Executes/execute_ringcentral_spam.py" | tee execute-output.txt
              ;;
            general)
              python "Executes/Modules Executes/execute_general_module.py" | tee execute-output.txt
              ;;
            *)
              echo "Unsupported EXECUTE_MODULE: ${{ steps.resolve-module.outputs.execute_module }}" >&2
              exit 1
              ;;
          esac

      - name: Persist notification log
        if: steps.resolve-ticket.outputs.should_execute == 'true' && steps.resolve-module.outputs.execute_module == 'notification'
        shell: bash
        run: |
          if git diff --quiet -- 'modules/notifications_module/output'; then
            echo "Notification log unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'modules/notifications_module/output'
          git commit -m "Update notification log"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Close GitHub issue for executed ticket
        if: steps.resolve-ticket.outputs.should_execute == 'true'
        shell: bash
        run: |
          python Executes/close_execute_issue.py

      - name: Publish execute summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Execute Result"
            echo
            if [[ -f execute-output.txt ]]; then
              echo '```text'
              cat execute-output.txt
              echo '```'
            else
              echo "${{ steps.resolve-ticket.outputs.status_message }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"